# Baseline Configuration (A03 Sprint 5 Baseline)
# Run ID: R1-baseline
# Platform: Kaggle Notebooks (2x T4 GPU)
#
# This is the A03 baseline: patch_size=16 produces only 5 tokens (4 patches + 1 CLS).
# The 5x5 attention matrix fits entirely in GPU SRAM, so FlashAttention's
# tiling has no HBM traffic to optimize.

model:
  name: "vit-small"
  patch_size: 16              # 32/16 = 2x2 = 4 patches + 1 CLS = 5 tokens
  embed_dim: 384
  num_heads: 6
  num_layers: 12
  sequence_length: 5          # derived: (32/16)^2 + 1

dataset:
  name: "cifar-10"
  image_size: 32

training:
  batch_size: 64              # per GPU, held constant
  num_steps: 100
  warmup_steps: 10            # excluded from timing
  optimizer: "adam"
  learning_rate: 1.0e-3
  seed: 42

attention:
  backend: "math"             # standard PyTorch math-based attention
  # Also tested with "flash" (FlashAttention via SDPA) for comparison

parallelization:
  strategy: "ddp"             # DistributedDataParallel
  num_gpus: 2

precision: "float32"

hardware:
  platform: "Kaggle Notebooks"
  gpu_type: "NVIDIA Tesla T4 (16 GB HBM2)"
  num_gpus: 2
  interconnect: "PCIe"
